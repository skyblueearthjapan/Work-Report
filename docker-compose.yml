services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: lineworks-web:dev
    container_name: lineworks-web
    ports:
      - "5174:5174"
    environment:
      - PORT=5174
    volumes:
      - ./server:/app/server
      - ./web:/app/web
      - ./data:/app/data       # SQLite・一時ファイルの永続化（V2以降）
    restart: unless-stopped
