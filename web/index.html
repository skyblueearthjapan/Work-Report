<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>デジタル作業報告書</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <!-- LINE W ロゴ -->
  <script src="/logo.js"></script>
  <!-- PDFバックアップ生成 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- 起動: /api/boot を取得して window.BOOT を用意してから app.js を読み込む -->
  <script>
    fetch('/api/boot').then(function (r) { return r.json(); }).then(function (b) {
      window.BOOT = b;
      var s = document.createElement('script'); s.src = '/app.js'; document.body.appendChild(s);
    }).catch(function (e) {
      document.getElementById('root').textContent = '起動に失敗しました: ' + e;
    });
  </script>
</body>
</html>
