# アプリ本体(compose プロジェクト "lineworks")とは別プロジェクトにして、
# アプリ更新時の --remove-orphans 等で公開ノードを巻き込まないようにする。
name: lineworks-ts

services:
  tailscale-lineworks:
    image: tailscale/tailscale:latest
    container_name: tailscale-lineworks
    hostname: lineworks
    network_mode: host
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=lineworks
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_EXTRA_ARGS=--reset
    volumes:
      - ./ts-lineworks-state:/var/lib/tailscale
      - ./ts-serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
